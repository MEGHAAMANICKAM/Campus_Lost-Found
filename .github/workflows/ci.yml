name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build -t meghaamanickam/lostfound-backend:latest ./backend

      - name: Push Backend Image
        run: |
          docker push meghaamanickam/lostfound-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t meghaamanickam/lostfound-frontend:latest ./frontend

      - name: Push Frontend Image
        run: |
          docker push meghaamanickam/lostfound-frontend:latest